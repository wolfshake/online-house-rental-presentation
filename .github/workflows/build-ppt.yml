name: Generate PowerPoint Slide Deck

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-pptx

    # This line now explicitly matches your uploaded filename
    - name: Run Slide Generation Script
      run: python generate_ppt_beautiful.py

    - name: Upload Slide Deck Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Online_House_Rental_Presentation
        path: Online_House_Rental_Beautiful_Presentation.pptx
